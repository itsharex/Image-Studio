name: Verify Platform Kernel

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify-local-platform-kernel:
    name: Verify local platform kernel suite
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            image-studio/frontend/package-lock.json
            cloudflare-worker/package-lock.json

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Android local.properties
        run: |
          mkdir -p .tmp/android-home/.android
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > android-shell/local.properties

      - name: Verify local platform kernel suite
        run: node ./scripts/verify-local-platform-kernel.mjs
